<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to WasteX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .features {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        
        .feature:hover {
            transform: translateY(-5px);
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature p {
            font-size: 0.9em;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome to WasteX</h1>
        <p>Your Django project is up and running successfully!</p>
        <div class="badge">Django 5.2.10</div>
        
        <div class="features">
            <div class="feature">
                <h3>⚡</h3>
                <p>Fast & Modern</p>
            </div>
            <div class="feature">
                <h3>🔒</h3>
                <p>Secure</p>
            </div>
            <div class="feature">
                <h3>🚀</h3>
                <p>Ready to Scale</p>
            </div>
        </div>
        
        <div style="margin-top: 40px; text-align: center;">
            <h2 style="color: #333; margin-bottom: 20px;">Quick Access</h2>
            <a href="/classifier/" style="display: inline-block; background: #667eea; color: white; padding: 15px 30px; margin: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">📤 Upload & Classify</a>
            <a href="/classifier/dashboard/" style="display: inline-block; background: #764ba2; color: white; padding: 15px 30px; margin: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">📊 View Dashboard</a>
            <a href="/classifier/api/docs/" style="display: inline-block; background: #52b788; color: white; padding: 15px 30px; margin: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">📖 API Docs</a>
        </div>
    </div>
</body>
</html>
